version: '3.9'

services:
  # ── Spring Boot Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chaos-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chaos-net
    labels:
      # LitmusChaos experiment labels
      app: chaos-poc
      layer: backend
      litmuschaos.io/chaos: "true"

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chaos-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - BACKEND_HOST=backend
    networks:
      - chaos-net
    labels:
      app: chaos-poc
      layer: frontend


  # ── AI Agent (Streamlit + LangGraph) ────────────────────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: chaos-agent
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - ./agent/.env
    networks:
      - chaos-net
    labels:
      app: chaos-poc
      layer: agent


networks:
  chaos-net:
    driver: bridge

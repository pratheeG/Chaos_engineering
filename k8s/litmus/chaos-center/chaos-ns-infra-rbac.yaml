apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infra-role
  namespace: chaos-ns
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - events
      - configmaps
      - secrets
      - services
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update", "deletecollection"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
      - daemonsets
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update", "deletecollection"]
  - apiGroups: ["litmuschaos.io"]
    resources:
      - chaosengines
      - chaosexperiments
      - chaosresults
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: ["apps.openshift.io"]
    resources: ["deploymentconfigs", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  # deriving the parent/owner details of the pod(if parent is deploymentConfig)
  - apiGroups: [""]
    resources: ["replicationcontrollers"]
    verbs: ["get","list"]
  # deriving the parent/owner details of the pod(if parent is argo-rollouts)
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts"]
    verbs: ["list","get"]
  # for configuring and monitor the experiment job by the chaos-runner pod
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create","list","get","delete","deletecollection"]
  # for creation, status polling and deletion of litmus chaos resources used within a chaos workflow
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines","chaosexperiments","chaosresults"]
    verbs: ["create","list","get","patch","update","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infra-ops-role
  namespace: chaos-ns
rules:
  - apiGroups: [""]
    resources:
      - pods
      - configmaps
      - secrets
      - events
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["litmuschaos.io"]
    resources:
      - chaosengines
      - chaosexperiments
      - chaosresults
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infra-role-binding
  namespace: chaos-ns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infra-role
subjects:
  - kind: ServiceAccount
    name: litmus
    namespace: litmus
  - kind: ServiceAccount
    name: litmus-admin  # ✅ Required: ChaosEngine uses chaosServiceAccount: litmus-admin
    namespace: litmus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infra-ops-role-binding
  namespace: chaos-ns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infra-ops-role
subjects:
  - kind: ServiceAccount
    name: litmus
    namespace: litmus
  - kind: ServiceAccount
    name: litmus-admin  # ✅ Required: ChaosEngine uses chaosServiceAccount: litmus-admin
    namespace: litmus

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litmus-scc-privileged-binding
  namespace: chaos-ns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: litmus
    namespace: litmus
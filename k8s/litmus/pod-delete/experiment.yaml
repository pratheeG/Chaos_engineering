# ── ChaosExperiment: pod-delete ─────────────────────────────────────────────────
# Defines the pod-delete chaos experiment template.
# The chaos-runner will spawn a job using this spec when a ChaosEngine
# references this experiment.
# ───────────────────────────────────────────────────────────────────────────────

apiVersion: litmuschaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: pod-delete
  namespace: chaos-ns
  labels:
    app.kubernetes.io/part-of: litmus
    app.kubernetes.io/component: chaosexperiment
    experiment: pod-delete
spec:
  definition:
    scope: Namespaced
    permissions:
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["create", "delete", "get", "list", "patch", "update", "deletecollection"]
      - apiGroups: [""]
        resources: ["pods/exec", "pods/log"]
        verbs: ["create", "get", "list"]
      - apiGroups: [""]
        resources: ["events"]
        verbs: ["create", "get", "list", "patch", "update"]
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list"]
      - apiGroups: ["apps"]
        resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
        verbs: ["list", "get"]
      - apiGroups: ["apps.openshift.io"]
        resources: ["deploymentconfigs"]
        verbs: ["list", "get"]
      - apiGroups: ["batch"]
        resources: ["jobs"]
        verbs: ["create", "list", "get", "delete", "deletecollection"]
      - apiGroups: ["litmuschaos.io"]
        resources: ["chaosengines", "chaosexperiments", "chaosresults"]
        verbs: ["create", "list", "get", "patch", "update", "delete"]
    image: "litmuschaos/go-runner:3.0.0"
    imagePullPolicy: Always
    args:
      - -c
      - ./experiments -name pod-delete
    command:
      - /bin/bash
    env:
      # Duration (seconds) the chaos runs
      - name: TOTAL_CHAOS_DURATION
        value: "30"
      # Time (seconds) between successive pod deletions
      - name: CHAOS_INTERVAL
        value: "10"
      # Force-delete the pod (no graceful shutdown)
      - name: FORCE
        value: "true"
      # Percentage of pods to target (empty = 1 pod)
      - name: PODS_AFFECTED_PERC
        value: ""
      # Ramp time before/after chaos
      - name: RAMP_TIME
        value: ""
      # Execute deletions in parallel or serial
      - name: SEQUENCE
        value: "parallel"
      # Specific target pod name (empty = random selection)
      - name: TARGET_PODS
        value: ""
      # Specific container to target (empty = all)
      - name: TARGET_CONTAINER
        value: ""
    labels:
      name: pod-delete
      app.kubernetes.io/part-of: litmus
      app.kubernetes.io/component: experiment-job

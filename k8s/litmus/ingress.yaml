# ── Ingress: Chaos Center Dashboard ───────────────────────────────────────────
# Exposes the Chaos Center UI at http://litmus.local
# Requires: minikube tunnel + hosts file entry: 127.0.0.1 litmus.local
# ───────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litmus-ingress
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://litmus.local"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: litmus.local
      http:
        paths:
          # GraphQL API server
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: chaos-litmus-server-service
                port:
                  number: 9002
          # Auth server
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: chaos-litmus-auth-server-service
                port:
                  number: 9003
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chaos-litmus-frontend-service
                port:
                  number: 9091

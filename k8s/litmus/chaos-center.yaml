# ── LitmusChaos Center (Dashboard) ────────────────────────────────────────────
# Deploys the Chaos Center UI + API stack in the 'litmus' namespace.
#
# Components:
#   - litmus-mongo        : Dedicated MongoDB for Chaos Center metadata
#   - litmus-auth-server  : Authentication service (default login admin/litmus)
#   - litmus-server       : GraphQL API server (workflow orchestration)
#   - litmus-frontend     : React dashboard UI
#
# Usage:
#   kubectl apply -f chaos-center.yaml
#
# Access (after minikube tunnel):
#   http://litmus.local:9091  or  kubectl port-forward svc/litmus-frontend 9091:9091 -n litmus
#
# Default Credentials:
#   Username: admin
#   Password: litmus
# ───────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════════════
#  1. MONGO — Dedicated database for Chaos Center
# ══════════════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litmus-mongo-pvc
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litmus-mongo
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litmus
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: mongo
          image: mongo:6.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          env:
            - name: MONGO_INITDB_DATABASE
              value: litmus
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: litmus-mongo-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: litmus-mongo
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/component: database
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP

# ══════════════════════════════════════════════════════════════════════════════
#  2. AUTH SERVER — Handles login, user management, API tokens
# ══════════════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litmus-auth-config
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: auth-server
data:
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "litmus"
  DB_SERVER: "mongodb://litmus-mongo:27017"
  DB_NAME: "litmus"
  PORT: "3030"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litmus-auth-server
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: auth-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: auth-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litmus
        app.kubernetes.io/component: auth-server
    spec:
      containers:
        - name: auth-server
          image: litmuschaos/litmusportal-auth-server:3.0.0
          ports:
            - containerPort: 3030
          envFrom:
            - configMapRef:
                name: litmus-auth-config
          env:
            - name: STRICT_PASSWORD_POLICY
              value: "false"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /status
              port: 3030
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /status
              port: 3030
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: litmus-auth-server
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: auth-server
spec:
  selector:
    app.kubernetes.io/component: auth-server
  ports:
    - port: 9003
      targetPort: 3030
  type: ClusterIP

# ══════════════════════════════════════════════════════════════════════════════
#  3. GRAPHQL SERVER — Core Chaos Center API (workflow management, scheduling)
# ══════════════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litmus-server-config
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: server
data:
  DB_SERVER: "mongodb://litmus-mongo:27017"
  DB_NAME: "litmus"
  PORTAL_ENDPOINT: "http://litmus-server:9002"
  SELF_CLUSTER: "true"
  AGENT_DEPLOYMENTS: "[\"app=chaos-exporter\",\"name=chaos-operator\",\"app=workflow-controller\"]"
  NODE_NAME: ""
  CHAOS_CENTER_SCOPE: "cluster"
  SUBSCRIBER_IMAGE: "litmuschaos/litmusportal-subscriber:3.0.0"
  EVENT_TRACKER_IMAGE: "litmuschaos/litmusportal-event-tracker:3.0.0"
  ARGO_WORKFLOW_CONTROLLER_IMAGE: "argoproj/workflow-controller:v3.4.11"
  ARGO_WORKFLOW_EXECUTOR_IMAGE: "argoproj/argoexec:v3.4.11"
  LITMUS_CHAOS_OPERATOR_IMAGE: "litmuschaos/chaos-operator:3.0.0"
  LITMUS_CHAOS_RUNNER_IMAGE: "litmuschaos/chaos-runner:3.0.0"
  LITMUS_CHAOS_EXPORTER_IMAGE: "litmuschaos/chaos-exporter:3.0.0"
  SERVER_SERVICE_NAME: "litmus-server"
  CONTAINER_RUNTIME_EXECUTOR: "k8sapi"
  HUB_BRANCH_NAME: "v3.0.x"
  INFRA_COMPATIBLE_VERSIONS: "[\"3.0.0\"]"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litmus-server-sa
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: server

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: litmus-server-cr
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: server
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "pods/log", "pods/exec", "services",
                "configmaps", "secrets", "serviceaccounts", "events", "nodes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines", "chaosexperiments", "chaosresults", "chaosschedules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "cronworkflows", "clusterworkflowtemplates",
                "workflowtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: litmus-server-crb
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: litmus-server-cr
subjects:
  - kind: ServiceAccount
    name: litmus-server-sa
    namespace: litmus

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litmus-server
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litmus
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: litmus-server-sa
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z litmus-mongo 27017; do
                echo "Waiting for litmus-mongo...";
                sleep 3;
              done;
              echo "Litmus MongoDB is ready!"
      containers:
        - name: graphql-server
          image: litmuschaos/litmusportal-server:3.0.0
          ports:
            - containerPort: 8080
              name: gql-server
            - containerPort: 8000
              name: gql-rpc
          envFrom:
            - configMapRef:
                name: litmus-server-config
          env:
            - name: LITMUS_PORTAL_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PORTAL_SCOPE
              value: "cluster"
            - name: SERVER_PORT
              value: "8080"
            - name: RPC_PORT
              value: "8000"
            - name: AUTH_GRPC_ENDPOINT
              value: "litmus-auth-server:9003"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: litmus-server
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: server
spec:
  selector:
    app.kubernetes.io/component: server
  ports:
    - name: gql-server
      port: 9002
      targetPort: 8080
    - name: gql-rpc
      port: 8000
      targetPort: 8000
  type: ClusterIP

# ══════════════════════════════════════════════════════════════════════════════
#  4. FRONTEND — Chaos Center Dashboard UI
# ══════════════════════════════════════════════════════════════════════════════

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litmus-frontend
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litmus
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: litmuschaos/litmusportal-frontend:3.0.0
          ports:
            - containerPort: 8185
          env:
            - name: BACKEND_SERVER
              value: "http://litmus-server:9002"
            - name: BACKEND_AUTH_SERVER
              value: "http://litmus-auth-server:9003"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8185
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8185
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: litmus-frontend
  namespace: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/component: frontend
  ports:
    - port: 9091
      targetPort: 8185
  type: NodePort

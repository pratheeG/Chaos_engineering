apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-backend
  namespace: chaos-ns
  labels:
    app: chaos-backend
    layer: backend
    litmuschaos.io/chaos: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-backend
  template:
    metadata:
      labels:
        app: chaos-backend
        layer: backend
        litmuschaos.io/chaos: "true"
    spec:
      containers:
        - name: chaos-backend
          image: chaos-backend:latest
          imagePullPolicy: Never          # Use image built into Minikube's Docker
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-atlas-secret
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 30
            failureThreshold: 3
